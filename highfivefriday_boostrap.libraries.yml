  license:
    name: GNU-GPL-2.0-or-later
    url: https://github.com/woothemes/FlexSlider/blob/master/LICENSE.md
    gpl-compatible: true
  js:
    /libraries/flexslider/jquery.flexslider-min.js: { minified: true }
hffflexslider:
  js:
    js/flexslider.js: {}
  css:
    theme:
      css/flexslider.css: {}
      /libraries/flexslider/demo/css/flexslider.css: {}
  dependencies:
      - core/jquery
      - core/drupal
      - core/once
      - highfivefriday_bootstrap/flexslider
highfivefriay_bootstrap_googlefonts:
